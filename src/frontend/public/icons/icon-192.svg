<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <filter id="glow192">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="purpleGrad192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="28" fill="#000000"/>
  <!-- Subtle purple corner glow -->
  <rect width="192" height="192" rx="28" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  <!-- Bold Z letter -->
  <text
    x="96"
    y="130"
    font-family="Arial Black, Arial, sans-serif"
    font-size="108"
    font-weight="900"
    text-anchor="middle"
    fill="url(#purpleGrad192)"
    filter="url(#glow192)"
    letter-spacing="-4"
  >Z</text>
  <!-- Underline accent -->
  <rect x="44" y="148" width="104" height="5" rx="2.5" fill="#7c3aed" opacity="0.8" filter="url(#glow192)"/>
</svg>
