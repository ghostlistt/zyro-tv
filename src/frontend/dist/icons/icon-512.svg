<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow512">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="purpleGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="#000000"/>
  <!-- Subtle purple corner glow -->
  <rect width="512" height="512" rx="72" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.5"/>
  <!-- Bold Z letter -->
  <text
    x="256"
    y="348"
    font-family="Arial Black, Arial, sans-serif"
    font-size="290"
    font-weight="900"
    text-anchor="middle"
    fill="url(#purpleGrad512)"
    filter="url(#glow512)"
    letter-spacing="-10"
  >Z</text>
  <!-- Underline accent -->
  <rect x="116" y="390" width="280" height="14" rx="7" fill="#7c3aed" opacity="0.8" filter="url(#glow512)"/>
</svg>
